{{ template "widget-base.html" . }}

{{ define "widget-content-classes" }}widget-content-frameless{{ end }}

{{ define "widget-content" }}
<div class="search widget-content-frame padding-inline-widget flex gap-15 items-center" data-default-search-url="{{ .SearchEngine }}" data-new-tab="{{ .NewTab }}" data-target="{{ .Target }}">
    <div class="search-bangs">
        {{ range .Bangs }}
        <input type="hidden" data-shortcut="{{ .Shortcut }}" data-title="{{ .Title }}" data-url="{{ .URL }}">
        {{ end }}
    </div>

    <div class="search-icon-container">
        <svg class="search-icon" stroke="var(--color-text-subdue)" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
    </div>

    <input class="search-input" type="text" placeholder="{{ .Placeholder }}" autocomplete="off"{{ if .Autofocus }} autofocus{{ end }}>

    <div class="search-bang"></div>
    <kbd class="hide-on-mobile" title="Press [S] to focus the search input">S</kbd>
</div>

<script>
(function() {
    const searchWidget = document.currentScript.previousElementSibling;
    const input = searchWidget.querySelector('.search-input');
    
    const detectUrlEnabled = searchWidget.getAttribute('data-detect-url') === 'true';
    const defaultNewTab = searchWidget.getAttribute('data-new-tab') === 'true';
    const targetAttr = searchWidget.getAttribute('data-target') || '_self';

    function isUrl(str) {
        if (str.includes(' ')) return false;
        return str.includes('.') || str.startsWith('localhost');
    }

    input.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') return;

        const val = input.value.trim();

        if (detectUrlEnabled && isUrl(val)) {
            
            e.preventDefault();
            e.stopImmediatePropagation();

            let url = val;
            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            let shouldOpenNewTab = defaultNewTab;
            
            if (e.ctrlKey || e.metaKey) {
                shouldOpenNewTab = !defaultNewTab;
            }

            if (shouldOpenNewTab) {
                window.open(url, '_blank');
            } else {
                window.location.href = url;
            }
        }
    });
});
</script>
{{ end }}
